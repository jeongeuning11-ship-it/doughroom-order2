<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5C4A32" />
  <title>doughroom 발주관리</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#F5F0E8;-webkit-tap-highlight-color:transparent}
    a,button,input,select{font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const C={
  bg:"#F5F0E8",surface:"#FDFAF4",surface2:"#EDE8DF",border:"#D8D0C0",border2:"#C8BEA8",
  accent:"#1A1714",gold:"#9A7F52",text:"#1A1714",dim:"#6B6358",muted:"#A09888",
  danger:"#C0392B",dangerD:"rgba(192,57,43,0.1)",green:"#2D7A4F",greenD:"rgba(45,122,79,0.1)",
  blue:"#2C5F8A",blueD:"rgba(44,95,138,0.1)",orange:"#C0622B",kakao:"#FEE500"
};

const CAT={
  bev:{label:"음료·식자재",emoji:"🧊",color:C.blue},
  supply:{label:"비품·소모품",emoji:"📦",color:C.gold},
  equip:{label:"기물·집기",emoji:"🔧",color:C.orange}
};

const STATUS={
  waiting:{label:"대기중",color:C.gold,dim:"rgba(154,127,82,0.12)",next:"ordered",nextLabel:"발주하기"},
  ordered:{label:"발주중",color:C.blue,dim:"rgba(44,95,138,0.12)",next:"delivered",nextLabel:"배송완료"},
  delivered:{label:"배송완료",color:C.green,dim:"rgba(45,122,79,0.12)",next:null,nextLabel:null}
};

const DEFAULT_ITEMS=[
  {id:1,name:"에비앙 330ml",cat:"bev",note:"6병 단위 박스",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:2,name:"탄산수 (페리에/산펠레그리노)",cat:"bev",note:"서비스 기본 제공",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:3,name:"오렌지 주스",cat:"bev",note:"냉장 보관",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:4,name:"우유 (전지/저지방)",cat:"bev",note:"커피용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:5,name:"드립 커피 원두",cat:"bev",note:"현재 사용 블렌드",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:6,name:"티백 (녹차/허브류)",cat:"bev",note:"웰컴티 서비스용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:7,name:"소금 (천일염)",cat:"bev",note:"조리용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:8,name:"버터",cat:"bev",note:"냉장",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:9,name:"화장지 (업소용)",cat:"supply",note:"화장실 비치",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:10,name:"핸드타올 페이퍼",cat:"supply",note:"주방·화장실",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:11,name:"주방세제",cat:"supply",note:"식기 세척용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:12,name:"비닐장갑",cat:"supply",note:"주방 위생용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:13,name:"랩·호일",cat:"supply",note:"주방 보관용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:14,name:"쓰레기봉투 (대)",cat:"supply",note:"분리수거 포함",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:15,name:"살균 소독제",cat:"supply",note:"식품 접촉면용",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:16,name:"영수증 용지 (POS)",cat:"supply",note:"80mm 롤",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:17,name:"와인잔 (레드용)",cat:"equip",note:"리델/깨짐 확인",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:18,name:"와인잔 (화이트용)",cat:"equip",note:"리델/깨짐 확인",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:19,name:"워터글라스",cat:"equip",note:"서비스 기본",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:20,name:"디너 포크",cat:"equip",note:"세트 수량 확인",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:21,name:"디너 나이프",cat:"equip",note:"세트 수량 확인",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:22,name:"스푼 (디저트)",cat:"equip",note:"",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:23,name:"서빙 트레이 (소)",cat:"equip",note:"",purchaseUrl:"",favorite:false,lastOrderedAt:""},
  {id:24,name:"캔들 홀더",cat:"equip",note:"테이블 세팅용",purchaseUrl:"",favorite:false,lastOrderedAt:""}
];

const inputStyle={width:"100%",padding:"13px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none"};
const today=()=>new Date().toLocaleString("ko-KR");
const shortDate=v=>v ? v.split(". ").slice(0,3).join(".") : "없음";
const safeText=v=>(v||"").toString().toLowerCase();
const defaultBuyUrl=name=>`https://search.shopping.naver.com/search/all?query=${encodeURIComponent(name)}`;

function Modal({children,onClose}){
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(26,23,20,.55)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:540,background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 20px 44px",borderTop:`1px solid ${C.border}`,maxHeight:"88vh",overflowY:"auto"}}>{children}</div>
  </div>;
}

function Tag({status}){
  const s=STATUS[status]||STATUS.waiting;
  return <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:s.dim,color:s.color,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>;
}

function Pill({label,active,color,onClick}){
  return <button onClick={onClick} style={{padding:"7px 15px",borderRadius:20,fontSize:13,fontWeight:600,border:`1px solid ${active?color:C.border}`,background:active?"rgba(0,0,0,.06)":"transparent",color:active?color:C.dim,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{label}</button>;
}

function ItemModal({item,onSave,onDelete,onClose}){
  const isEdit=!!item;
  const [name,setName]=useState(item?.name||"");
  const [cat,setCat]=useState(item?.cat||"bev");
  const [note,setNote]=useState(item?.note||"");
  const [purchaseUrl,setPurchaseUrl]=useState(item?.purchaseUrl||"");
  const [price,setPrice]=useState(item?.price||"");
  const [favorite,setFavorite]=useState(!!item?.favorite);
  const label=t=><div style={{fontSize:12,color:C.dim,marginBottom:6,fontWeight:600}}>{t}</div>;
  const save=()=>{
    if(!name.trim()) return;
    onSave({name:name.trim(),cat,note:note.trim(),purchaseUrl:purchaseUrl.trim(),price:Number(price)||0,favorite});
    onClose();
  };
  return <Modal onClose={onClose}>
    <div style={{fontSize:18,fontWeight:700,marginBottom:20}}>{isEdit?"품목 수정":"품목 추가"}</div>
    <div style={{marginBottom:14}}>{label("품목명")}<input style={inputStyle} value={name} onChange={e=>setName(e.target.value)} placeholder="예: 콜라" /></div>
    <div style={{marginBottom:14}}>{label("카테고리")}<select style={{...inputStyle,appearance:"none"}} value={cat} onChange={e=>setCat(e.target.value)}><option value="bev">🧊 음료·식자재</option><option value="supply">📦 비품·소모품</option><option value="equip">🔧 기물·집기</option></select></div>
    <div style={{marginBottom:14}}>{label("비고")}<input style={inputStyle} value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 박스 단위" /></div>
    <div style={{marginBottom:14}}>{label("구매 링크")}<input style={inputStyle} value={purchaseUrl} onChange={e=>setPurchaseUrl(e.target.value)} placeholder="https://..." /></div>
    <div style={{marginBottom:14}}>{label("단가")}<input style={inputStyle} value={price} onChange={e=>setPrice(e.target.value.replace(/[^0-9]/g,""))} placeholder="예: 12000" inputMode="numeric" /></div>
    <button onClick={()=>setFavorite(v=>!v)} style={{width:"100%",padding:13,borderRadius:12,border:`1px solid ${favorite?C.gold:C.border}`,background:favorite?"rgba(154,127,82,.1)":"transparent",color:favorite?C.gold:C.dim,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14}}>{favorite?"★ 즐겨찾기 설정됨":"☆ 즐겨찾기"}</button>
    {isEdit&&onDelete&&<button onClick={()=>{onDelete(item.id);onClose();}} style={{width:"100%",padding:14,borderRadius:12,border:`1px solid ${C.danger}`,background:C.dangerD,color:C.danger,fontSize:15,fontWeight:600,cursor:"pointer",marginBottom:10}}>삭제</button>}
    <div style={{display:"flex",gap:10}}>
      <button onClick={onClose} style={{flex:1,padding:14,borderRadius:12,border:`1px solid ${C.border}`,background:"transparent",color:C.dim,fontSize:15,cursor:"pointer"}}>취소</button>
      <button onClick={save} style={{flex:2,padding:14,borderRadius:12,border:"none",background:C.accent,color:C.surface,fontSize:15,fontWeight:700,cursor:"pointer"}}>{isEdit?"저장":"추가"}</button>
    </div>
  </Modal>;
}

function KakaoModal({items,onClose}){
  const [copied,setCopied]=useState(false);
  const msg=`📦 [두룸 발주 요청]\n요청자: 직원\n일시: ${today()}\n\n${items.map((i,idx)=>`${idx+1}. ${CAT[i.cat].emoji} ${i.name} ×${i.qty||1}${i.note?" ("+i.note+")":""}`).join("\n")}\n\n총 ${items.length}개 품목\n확인 후 발주 부탁드립니다.`;
  const copy=async()=>{try{await navigator.clipboard.writeText(msg);}catch{const t=document.createElement("textarea");t.value=msg;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return <Modal onClose={onClose}>
    <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>발주 요청 완료</div>
    <div style={{fontSize:14,color:C.dim,marginBottom:20}}>필요하면 아래 내용을 복사해서 공유하세요.</div>
    <pre style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:14,padding:16,fontSize:13,lineHeight:1.9,whiteSpace:"pre-wrap",marginBottom:16,fontFamily:"inherit"}}>{msg}</pre>
    <button onClick={copy} style={{width:"100%",padding:15,borderRadius:12,border:`1px solid ${C.border}`,background:copied?C.greenD:"transparent",color:copied?C.green:C.dim,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:10}}>{copied?"복사됨":"내용 복사"}</button>
    <button onClick={onClose} style={{width:"100%",padding:14,borderRadius:12,border:"none",background:C.accent,color:C.surface,fontSize:15,fontWeight:700,cursor:"pointer"}}>닫기</button>
  </Modal>;
}

function HomeView({onEnter,waitingCount}){
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"90vh",padding:"0 28px"}}>
    <div style={{textAlign:"center",marginBottom:48}}>
      <div style={{fontSize:30,fontWeight:600,letterSpacing:".08em",color:"#5C4A32",marginBottom:10}}>doughroom gwanghwamun</div>
      <div style={{fontSize:15,fontWeight:700,letterSpacing:"-.04em",color:C.text,lineHeight:1}}>발주 관리 v3</div>
      <div style={{width:32,height:2,background:C.gold,margin:"20px auto 0"}} />
    </div>
    <div style={{width:"100%",maxWidth:340,display:"flex",flexDirection:"column",gap:14}}>
      <button onClick={()=>onEnter("staff")} style={{padding:"22px 0",borderRadius:16,background:C.accent,color:C.surface,fontSize:17,fontWeight:700,border:"none",cursor:"pointer"}}>발주 요청</button>
      <button onClick={()=>onEnter("manager")} style={{padding:"22px 0",borderRadius:16,background:"transparent",color:C.text,fontSize:17,fontWeight:700,border:`1.5px solid ${C.border2}`,cursor:"pointer",position:"relative"}}>발주 관리{waitingCount>0&&<span style={{position:"absolute",top:10,right:18,background:C.danger,color:"#fff",borderRadius:12,fontSize:12,fontWeight:700,padding:"2px 8px"}}>{waitingCount}건</span>}</button>
      <button onClick={()=>onEnter("history")} style={{padding:"22px 0",borderRadius:16,background:"transparent",color:C.gold,fontSize:17,fontWeight:700,border:`1px solid ${C.border}`,cursor:"pointer"}}>발주 이력</button>
    </div>
  </div>;
}

function StaffView({items,setItems,orders,onSubmit}){
  const [checked,setChecked]=useState({});
  const [qty,setQty]=useState({});
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("all");
  const [editMode,setEditMode]=useState(false);
  const [modal,setModal]=useState(null);
  const [kakao,setKakao]=useState(null);
  const nextId=()=>items.length?Math.max(...items.map(i=>Number(i.id)||0))+1:1;
  const selectedCount=Object.values(checked).filter(Boolean).length;
  const can=selectedCount>0;
  const activeById=id=>orders.find(o=>o.id===id&&o.status!=="delivered");
  const filtered=(cat==="all"?items:items.filter(i=>i.cat===cat))
    .filter(i=>!search.trim()||safeText(i.name).includes(safeText(search))||safeText(i.note).includes(safeText(search)))
    .sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)||safeText(a.name).localeCompare(safeText(b.name),"ko"));
  const saveItem=data=>{
    if(modal==="add") setItems(p=>[...p,{id:nextId(),lastOrderedAt:"",...data}]);
    else setItems(p=>p.map(i=>i.id===modal.id?{...i,...data}:i));
  };
  const deleteItem=id=>{setItems(p=>p.filter(i=>i.id!==id));setChecked(p=>{const n={...p};delete n[id];return n;});};
  const changeQty=(id,delta)=>setQty(p=>({ ...p, [id]:Math.max(1,(Number(p[id])||1)+delta) }));
  const submit=()=>{
    if(!can) return;
    const picked=items.filter(i=>checked[i.id]).map(i=>({...i,qty:Number(qty[i.id])||1}));
    onSubmit(picked);
    setKakao(picked);
    setChecked({});
    setQty({});
  };
  return <div style={{paddingBottom:110}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div><div style={{fontSize:22,fontWeight:700}}>{editMode?"품목 편집":"재고 체크"}</div><div style={{fontSize:13,color:C.dim,marginTop:3}}>{editMode?"탭해서 수정·삭제":"부족한 항목을 선택하고 수량을 조정하세요"}</div></div>
      <button onClick={()=>setEditMode(v=>!v)} style={{padding:"9px 18px",borderRadius:10,border:`1px solid ${editMode?C.gold:C.border}`,background:editMode?"rgba(154,127,82,.1)":"transparent",color:editMode?C.gold:C.dim,fontSize:14,fontWeight:600,cursor:"pointer"}}>{editMode?"완료":"편집"}</button>
    </div>
    {!editMode&&<div style={{marginBottom:18}}><div style={{fontSize:13,color:C.dim,fontWeight:600,marginBottom:7}}>품목 검색</div><input style={inputStyle} value={search} onChange={e=>setSearch(e.target.value)} placeholder="예: 콜라, 냅킨, 와인" /></div>}
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,marginBottom:16,scrollbarWidth:"none"}}>
      {[["all","전체",C.accent],["bev","음료",C.blue],["supply","비품",C.gold],["equip","기물",C.orange]].map(([k,l,col])=><Pill key={k} label={l} active={cat===k} color={col} onClick={()=>setCat(k)} />)}
    </div>
    {filtered.map(item=>{
      const active=activeById(item.id);
      const isChecked=!!checked[item.id];
      return <div key={item.id} onClick={()=>{if(editMode){setModal(item);return;} if(active)return; setChecked(p=>({...p,[item.id]:!p[item.id]}));}} style={{display:"flex",alignItems:"center",gap:12,background:active?(active.status==="ordered"?"#EFEFEF":"#FFF5D8"):isChecked?C.dangerD:C.surface,border:`1px solid ${active?(active.status==="ordered"?"#D0D0D0":"#E2C46A"):isChecked?C.danger:C.border}`,borderRadius:14,padding:"14px 15px",marginBottom:9,cursor:active&&!editMode?"not-allowed":"pointer",opacity:active&&!editMode?.88:1}}>
        <div style={{fontSize:18,width:24,textAlign:"center"}}>{editMode?"✎":isChecked?"✓":item.favorite?"★":""}</div>
        <div style={{width:8,height:8,borderRadius:"50%",background:CAT[item.cat].color,flexShrink:0}} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontWeight:700,fontSize:15,color:isChecked?C.danger:C.text}}>{item.name}</span>{active&&<Tag status={active.status}/>}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4,lineHeight:1.7}}>{CAT[item.cat].label}{item.note?" · "+item.note:""}<br/>마지막 발주일: {shortDate(item.lastOrderedAt)}</div>
        </div>
        {!editMode&&isChecked&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}><button onClick={()=>changeQty(item.id,-1)} style={{width:28,height:28,borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer"}}>-</button><span style={{minWidth:22,textAlign:"center",fontWeight:800}}>{Number(qty[item.id])||1}</span><button onClick={()=>changeQty(item.id,1)} style={{width:28,height:28,borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer"}}>+</button></div>}
        {editMode&&<span style={{color:C.muted,fontSize:22}}>›</span>}
      </div>;
    })}
    <button onClick={()=>setModal("add")} style={{width:"100%",padding:15,borderRadius:14,border:`1.5px dashed ${C.border2}`,background:"transparent",color:C.muted,fontSize:15,cursor:"pointer",marginTop:6}}>+ 품목 추가</button>
    {!editMode&&<div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px 20px 32px",background:C.surface,borderTop:`1px solid ${C.border}`,zIndex:50}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:540,margin:"0 auto"}}><div><span style={{color:C.danger,fontSize:22,fontWeight:800}}>{selectedCount}</span><span style={{fontSize:13,color:C.dim}}> 개 선택</span></div><button disabled={!can} onClick={submit} style={{padding:"14px 30px",borderRadius:14,border:"none",background:can?C.accent:C.border2,color:can?C.surface:C.muted,fontWeight:700,fontSize:16,cursor:can?"pointer":"not-allowed"}}>발주 요청 제출</button></div></div>}
    {modal&&<ItemModal item={modal==="add"?null:modal} onSave={saveItem} onDelete={deleteItem} onClose={()=>setModal(null)} />}
    {kakao&&<KakaoModal items={kakao} onClose={()=>setKakao(null)} />}
  </div>;
}

function ManagerView({orders,onUpdateStatus,onUpdateItem}){
  const [status,setStatus]=useState("active");
  const [cat,setCat]=useState("all");
  const [edit,setEdit]=useState(null);
  const activeOrders=orders.filter(o=>o.status!=="delivered");
  const filtered=activeOrders.filter(o=>(status==="active"||o.status===status)&&(cat==="all"||o.cat===cat));
  const cnt={active:activeOrders.length,waiting:orders.filter(o=>o.status==="waiting").length,ordered:orders.filter(o=>o.status==="ordered").length};
  return <div>
    <div style={{fontSize:22,fontWeight:700,marginBottom:2}}>발주 관리</div>
    <div style={{fontSize:13,color:C.dim,marginBottom:20}}>발주하기는 새 탭으로 구매 링크가 열리고, 배송완료는 이력으로 이동합니다.</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
      {[["active","진행중",C.accent],["waiting","대기중",C.gold],["ordered","발주중",C.blue]].map(([k,l,col])=><div key={k} onClick={()=>setStatus(status===k?"active":k)} style={{background:status===k?"rgba(0,0,0,.05)":C.surface,border:`1.5px solid ${status===k?col:C.border}`,borderRadius:14,padding:"14px 8px",textAlign:"center",cursor:"pointer"}}><div style={{fontSize:26,fontWeight:800,color:col}}>{cnt[k]}</div><div style={{fontSize:11,color:C.dim,marginTop:3,fontWeight:600}}>{l}</div></div>)}
    </div>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,marginBottom:18,scrollbarWidth:"none"}}>{[["all","전체",C.accent],["bev","음료",C.blue],["supply","비품",C.gold],["equip","기물",C.orange]].map(([k,l,col])=><Pill key={k} label={l} active={cat===k} color={col} onClick={()=>setCat(k)} />)}</div>
    {filtered.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:40,marginBottom:12}}>📭</div><div style={{fontSize:15}}>진행 중인 발주가 없습니다.</div></div>:filtered.map(order=>{
      const st=STATUS[order.status];
      const buyUrl=order.purchaseUrl||defaultBuyUrl(order.name);
      const total=(Number(order.price)||0)*(Number(order.qty)||1);
      return <div key={order.orderId} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:16,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
          <div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}><span style={{fontWeight:800,fontSize:16}}>{order.name} ×{order.qty||1}</span><Tag status={order.status}/></div><div style={{fontSize:12,color:C.muted,lineHeight:1.8}}>{CAT[order.cat].label}{order.note?" · "+order.note:""}<br/>요청자: {order.requester} · {order.submittedAt}{total>0?<><br/>금액: {total.toLocaleString()}원</>:null}</div></div>
          <button onClick={()=>setEdit(order)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:20,padding:"0 0 0 8px",flexShrink:0}}>✎</button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <a href={buyUrl} target="_blank" rel="noopener noreferrer" style={{padding:"9px 16px",borderRadius:9,fontSize:13,fontWeight:700,background:"rgba(3,199,90,.12)",color:"#00a050",textDecoration:"none"}}>구매 링크</a>
          <div style={{flex:1}} />
          {order.status==="waiting"&&<a href={buyUrl} target="_blank" rel="noopener noreferrer" onClick={()=>onUpdateStatus(order.orderId,"ordered")} style={{padding:"9px 18px",borderRadius:9,background:C.accent,color:C.surface,fontSize:13,fontWeight:700,textDecoration:"none",display:"inline-flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>발주하기 →</a>}
          {order.status==="ordered"&&<button onClick={()=>onUpdateStatus(order.orderId,"delivered")} style={{padding:"9px 18px",borderRadius:9,border:"none",background:C.green,color:C.surface,fontSize:13,fontWeight:700,cursor:"pointer"}}>배송완료 →</button>}
        </div>
      </div>;
    })}
    {edit&&<ItemModal item={edit} onSave={data=>{onUpdateItem(edit.orderId,data);setEdit(null);}} onDelete={null} onClose={()=>setEdit(null)} />}
  </div>;
}

function HistoryView({history}){
  const delivered=history.filter(o=>o.status==="delivered");
  const groups=delivered.reduce((acc,o)=>{
    const raw=o.deliveredAt||o.submittedAt||"";
    const p=raw.split(". ");
    const k=p.length>=2?`${p[0]}.${p[1]}`:"기타";
    if(!acc[k]) acc[k]=[];
    acc[k].push(o);
    return acc;
  },{});
  const sum=list=>list.reduce((a,o)=>a+(Number(o.price)||0)*(Number(o.qty)||1),0);
  return <div>
    <div style={{fontSize:22,fontWeight:700,marginBottom:2}}>배송완료 이력</div>
    <div style={{fontSize:13,color:C.dim,marginBottom:20}}>배송완료된 발주만 달별로 간략히 확인합니다.</div>
    {delivered.length===0?<div style={{textAlign:"center",padding:"50px 0",color:C.muted}}>배송완료 이력이 없습니다.</div>:Object.entries(groups).reverse().map(([month,list])=>
      <div key={month} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:C.surface2,borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:15,fontWeight:800}}>{month}</div>
          <div style={{fontSize:13,fontWeight:800,color:C.green}}>합계 {sum(list).toLocaleString()}원</div>
        </div>
        {list.map(o=>{
          const total=(Number(o.price)||0)*(Number(o.qty)||1);
          return <div key={o.orderId} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.name} ×{o.qty||1}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>{CAT[o.cat]?.label||"기타"} · {shortDate(o.deliveredAt||o.submittedAt)}</div>
            </div>
            <div style={{fontSize:13,fontWeight:800,whiteSpace:"nowrap"}}>{total>0?`${total.toLocaleString()}원`:"금액 미입력"}</div>
          </div>;
        })}
      </div>
    )}
  </div>;
}

function App(){
  const [view,setView]=useState("home");
  const [items,setItems]=useState(()=>JSON.parse(localStorage.getItem("dr_items_v2")||JSON.stringify(DEFAULT_ITEMS)));
  const [orders,setOrders]=useState(()=>JSON.parse(localStorage.getItem("dr_orders_v2")||"[]"));
  const [history,setHistory]=useState(()=>JSON.parse(localStorage.getItem("dr_history_v2")||"[]"));
  const [seq,setSeq]=useState(()=>JSON.parse(localStorage.getItem("dr_seq_v2")||"1"));
  useEffect(()=>localStorage.setItem("dr_items_v2",JSON.stringify(items)),[items]);
  useEffect(()=>localStorage.setItem("dr_orders_v2",JSON.stringify(orders)),[orders]);
  useEffect(()=>localStorage.setItem("dr_history_v2",JSON.stringify(history)),[history]);
  useEffect(()=>localStorage.setItem("dr_seq_v2",JSON.stringify(seq)),[seq]);
  const submit=picked=>{
    const now=today();
    const newOrders=picked.map((item,idx)=>({...item,orderId:`ORD-${String(seq+idx).padStart(4,"0")}-${item.id}`,requester:"직원",status:"waiting",submittedAt:now}));
    setOrders(p=>[...newOrders,...p]);
    setHistory(p=>[...newOrders,...p]);
    setItems(p=>p.map(i=>picked.some(x=>x.id===i.id)?{...i,lastOrderedAt:now}:i));
    setSeq(n=>n+picked.length);
  };
  const updateStatus=(id,next)=>{const doneAt=next==="delivered"?today():null;setOrders(p=>p.map(o=>o.orderId===id?{...o,status:next, ...(doneAt?{deliveredAt:doneAt}:{} )}:o));setHistory(p=>p.map(o=>o.orderId===id?{...o,status:next, ...(doneAt?{deliveredAt:doneAt}:{} )}:o));};
  const updateOrderItem=(id,data)=>{setOrders(p=>p.map(o=>o.orderId===id?{...o,...data}:o));setHistory(p=>p.map(o=>o.orderId===id?{...o,...data}:o));};
  const waiting=orders.filter(o=>o.status==="waiting").length;
  return <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",WebkitFontSmoothing:"antialiased"}}>
    {view!=="home"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",background:C.surface,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:100}}><button onClick={()=>setView("home")} style={{background:"transparent",border:"none",color:"#5C4A32",fontWeight:800,fontSize:14,cursor:"pointer",letterSpacing:".08em",padding:0}}>doughroom</button><div style={{display:"flex",gap:2,background:C.surface2,borderRadius:12,padding:4}}>{[["staff","발주"],["manager","관리자"],["history","완료"]].map(([k,l])=><button key={k} onClick={()=>setView(k)} style={{padding:"8px 14px",borderRadius:9,fontSize:13,fontWeight:view===k?700:500,border:"none",background:view===k?C.accent:"transparent",color:view===k?C.surface:C.dim,cursor:"pointer",position:"relative"}}>{l}{k==="manager"&&waiting>0&&<span style={{position:"absolute",top:2,right:2,background:C.danger,color:"#fff",borderRadius:8,fontSize:9,fontWeight:700,padding:"1px 4px",lineHeight:1}}>{waiting}</span>}</button>)}</div></div>}
    <div style={{maxWidth:540,margin:"0 auto",padding:view==="home"?"0":"20px 18px 80px"}}>
      {view==="home"&&<HomeView onEnter={setView} waitingCount={waiting}/>}      
      {view==="staff"&&<StaffView items={items} setItems={setItems} orders={orders} onSubmit={submit}/>}      
      {view==="manager"&&<ManagerView orders={orders} onUpdateStatus={updateStatus} onUpdateItem={updateOrderItem}/>}      
      {view==="history"&&<HistoryView history={history}/>}      
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
